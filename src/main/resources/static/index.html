<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>恋爱聊天助手 - 登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .logo p {
            color: #999;
            font-size: 14px;
        }
        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }
        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            color: #999;
            font-weight: 600;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        .form-panel {
            display: none;
        }
        .form-panel.active {
            display: block;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
        }
        .message.error {
            background: #ffebee;
            color: #c62828;
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>💕 恋爱聊天助手</h1>
            <p>AI驱动的智能恋爱沟通顾问</p>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">登录</div>
            <div class="tab" onclick="switchTab('register')">注册</div>
        </div>

        <!-- 登录表单 -->
        <div id="login-panel" class="form-panel active">
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>手机号</label>
                    <input type="text" id="login-phone" placeholder="请输入手机号" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="login-password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn" id="login-btn">登录</button>
            </form>
            <div id="login-message" class="message"></div>
        </div>

        <!-- 注册表单 -->
        <div id="register-panel" class="form-panel">
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>手机号</label>
                    <input type="text" id="reg-phone" placeholder="请输入手机号" required pattern="^1[3-9]\d{9}$">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="reg-password" placeholder="6-32位密码" required minlength="6" maxlength="32">
                </div>
                <div class="form-group">
                    <label>昵称（可选）</label>
                    <input type="text" id="reg-nickname" placeholder="请输入昵称">
                </div>
                <button type="submit" class="btn" id="register-btn">注册</button>
            </form>
            <div id="register-message" class="message"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8089/api';

        // 检查是否已登录
        if (localStorage.getItem('token')) {
            window.location.href = '/app.html';
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(tab + '-panel').classList.add('active');

            // 清空消息
            document.querySelectorAll('.message').forEach(m => {
                m.style.display = 'none';
                m.textContent = '';
            });
        }

        async function handleLogin(e) {
            e.preventDefault();

            const btn = document.getElementById('login-btn');
            const msg = document.getElementById('login-message');

            btn.disabled = true;
            btn.textContent = '登录中...';

            const data = {
                phone: document.getElementById('login-phone').value,
                password: document.getElementById('login-password').value
            };

            try {
                const response = await fetch(API_BASE + '/user/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.code === 200) {
                    localStorage.setItem('token', result.data.token);
                    localStorage.setItem('userId', result.data.userId);
                    localStorage.setItem('nickname', result.data.nickname);

                    msg.className = 'message success';
                    msg.textContent = '登录成功！正在跳转...';

                    setTimeout(() => {
                        window.location.href = '/app.html';
                    }, 1000);
                } else {
                    msg.className = 'message error';
                    msg.textContent = result.message || '登录失败';
                    btn.disabled = false;
                    btn.textContent = '登录';
                }
            } catch (error) {
                msg.className = 'message error';
                msg.textContent = '网络错误，请检查后端服务是否启动';
                btn.disabled = false;
                btn.textContent = '登录';
            }
        }

        async function handleRegister(e) {
            e.preventDefault();

            const btn = document.getElementById('register-btn');
            const msg = document.getElementById('register-message');

            btn.disabled = true;
            btn.textContent = '注册中...';

            const data = {
                phone: document.getElementById('reg-phone').value,
                password: document.getElementById('reg-password').value,
                nickname: document.getElementById('reg-nickname').value
            };

            try {
                const response = await fetch(API_BASE + '/user/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.code === 200) {
                    msg.className = 'message success';
                    msg.textContent = '注册成功！请登录';

                    // 清空表单
                    document.getElementById('reg-phone').value = '';
                    document.getElementById('reg-password').value = '';
                    document.getElementById('reg-nickname').value = '';

                    // 3秒后切换到登录
                    setTimeout(() => {
                        document.querySelector('.tab').click();
                    }, 2000);
                } else {
                    msg.className = 'message error';
                    msg.textContent = result.message || '注册失败';
                }

                btn.disabled = false;
                btn.textContent = '注册';
            } catch (error) {
                msg.className = 'message error';
                msg.textContent = '网络错误，请检查后端服务是否启动';
                btn.disabled = false;
                btn.textContent = '注册';
            }
        }
    </script>
</body>
</html>
