server:
  port: 8089
  tomcat:
    uri-encoding: UTF-8

spring:
  application:
    name: loveai
  profiles:
    active: local
  datasource:
    url: jdbc:mysql://localhost:3306/loveai?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

jwt:
  secret: loveai-secret-key-2024-spring-boot-jwt-token
  expiration: 86400000

logging:
  level:
    org:
      springframework:
        ai:
          chat:
            client:
              advisor: DEBUG
